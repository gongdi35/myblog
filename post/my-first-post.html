<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第一篇文章 — 闲笔</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <header class="topbar" id="topbar">
        <div class="shell">
            <nav class="nav" aria-label="主导航">
                <a class="brand" href="../index.html">
                    <span class="brand-mark">闲</span>
                    <span>闲笔</span>
                </a>
                <div class="nav-links">
                    <a href="../index.html" class="is-active">文章</a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        
<article class="post-detail shell">
    <header class="post-detail-header reveal">
        <h1>第一篇文章</h1>
        <p class="post-meta">
            <span class="meta-chip">2026-05-25</span>
        </p>
    </header>

    <div class="post-content reveal">
        <p>这是我用 Vibecoding 的方式自建博客的第一篇文章，很开心。</p>
    </div>

    <div class="post-actions reveal">
        <a href="../index.html" class="button">&#8592; 返回文章列表</a>
    </div>
</article>

    </main>

    <footer class="footer shell">
        <div class="footer-panel reveal">
            <p>© <span id="year"></span> 闲笔 · 静心写作 · 托管于 GitHub Pages</p>
        </div>
    </footer>

    <script>
        /* ---- Scroll-aware topbar ---- */
        (function() {
            var topbar = document.getElementById("topbar");
            var ticking = false;
            function update() {
                if (window.scrollY > 12) {
                    topbar.classList.add("is-scrolled");
                } else {
                    topbar.classList.remove("is-scrolled");
                }
                ticking = false;
            }
            window.addEventListener("scroll", function() {
                if (!ticking) { requestAnimationFrame(update); ticking = true; }
            });
            update();
        })();

        /* ---- Year ---- */
        document.getElementById("year").textContent = new Date().getFullYear();

        /* ---- Reveal on scroll ---- */
        (function() {
            var reveals = document.querySelectorAll(".reveal");
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add("is-visible");
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.14 });
            reveals.forEach(function(item) { observer.observe(item); });
        })();
    </script>
</body>
</html>
