{% extends "base.html" %}

{% block title %}{{ post.title }} - 我的博客{% endblock %}

{% block content %}
<article class="post-detail">
    <h1>{{ post.title }}</h1>

    <p class="post-meta">
        📅 {{ post.date }}
    </p>

    <hr>

    <div class="post-content">
        {{ post.content | safe }}
    </div>

    <hr>

    <div class="post-actions">
        <a href="{{ base_path }}/index.html" class="btn btn-secondary">← 返回首页</a>
    </div>
</article>
{% endblock %}
