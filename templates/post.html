{% extends "base.html" %}

{% block title %}{{ post.title }} — 闲笔{% endblock %}

{% block content %}
<article class="post-detail">
    <header class="post-detail-header">
        <h1>{{ post.title }}</h1>
        <p class="post-meta">
            {{ post.date }}
        </p>
    </header>

    <div class="post-content">
        {{ post.content | safe }}
    </div>

    <div class="post-actions">
        <a href="{{ base_path }}/index.html" class="btn btn-secondary">&#8592; 返回文章列表</a>
    </div>
</article>
{% endblock %}
