{% extends "base.html" %}

{% block title %}{{ post.title }} — myblog{% endblock %}

{% block content %}
<article class="post-detail">
    <h1>{{ post.title }}</h1>
    <p class="post-meta">{{ post.date }}</p>

    <div class="post-content">
        {{ post.content | safe }}
    </div>

    <div class="post-actions" style="margin-top: 32px;">
        <a href="{{ base_path }}/index.html" class="btn btn-secondary">← cd ../</a>
    </div>
</article>
{% endblock %}
