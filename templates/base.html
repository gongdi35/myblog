<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}myblog{% endblock %}</title>
    <link rel="stylesheet" href="{{ base_path }}/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ base_path }}/index.html" class="logo">myblog</a>
            <div class="nav-links">
                <a href="{{ base_path }}/index.html">/posts</a>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>built with markdown · deployed on github pages</p>
    </footer>
</body>
</html>
